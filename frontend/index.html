<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Калькулятор объема 3D-модели By HAISNAP</title>
  <link rel="stylesheet" href="https://unpkg.com/colorui/main.css">
  <link rel="stylesheet" href="https://unpkg.com/colorui/icon.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #FFFBF0;
      color: #2C2C2C;
      overflow-x: hidden;
    }
    #app {
      width: 100%;
      min-height: 100vh;
    }
    :root {
      --primary-color: #5D4037;
      --secondary-color: #FFFBF0;
      --accent-color: #FFD700;
      --text-primary: #2C2C2C;
      --text-secondary: #757575;
      --border-color: #E0E0E0;
      --shadow-light: rgba(93, 64, 55, 0.1);
      --shadow-medium: rgba(93, 64, 55, 0.15);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <!-- Google Model Viewer - легкая альтернатива без WebGL проблем -->
  <script type="module" src="https://unpkg.com/@google/model-viewer@^3.0.0/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer@^3.0.0/dist/model-viewer-legacy.js"></script>
  
  <!-- STL to GLB конвертер для поддержки STL файлов -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/exporters/GLTFExporter.js"></script>
  
  <script>
    // Проверка загрузки Model Viewer
    (function checkModelViewer() {
      let attempts = 0;
      const maxAttempts = 50;
      
      function verify() {
        attempts++;
        
        if (customElements.get('model-viewer')) {
          console.log('✓ [Model Viewer] Компонент загружен успешно');
          window.modelViewerLoaded = true;
          
          // Проверка THREE.js для конвертации
          if (typeof THREE !== 'undefined') {
            console.log('✓ [Three.js] Доступен для конвертации файлов');
            window.threeJSForConversion = true;
          }
        } else if (attempts < maxAttempts) {
          console.log('[Model Viewer] Ожидание загрузки... попытка', attempts);
          setTimeout(verify, 100);
        } else {
          console.error('✗ [Model Viewer] Не удалось загрузить компонент');
          window.modelViewerLoadError = true;
        }
      }
      
      verify();
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
